name: keysafe
description: "KeySafe - Zero-Knowledge Password Manager"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.3

  # Security & Cryptography
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  pointycastle: ^3.9.1
  crypto: ^3.0.6

  # Networking
  dio: ^5.8.0+1

  # Local Storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # QR
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.3
  package_info_plus: ^8.3.0
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2815.0
  archive: ^4.0.9
  flutter_local_notifications: ^17.2.4
  flutter_email_sender: ^7.0.0
  file_picker: ^8.1.7
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
